<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Visualizer 1.21.11</title>
<style>

  @font-face{font-family:'MinecraftTTF';src:url('minecraft.ttf');font-display:swap}
  *{box-sizing:border-box;image-rendering:pixelated}
  body{margin:0;font-family:'MinecraftTTF','VT323',monospace;font-size:19px;color:#3f3f3f;
    background-image:linear-gradient(rgba(0,0,0,.62),rgba(0,0,0,.62)),

    background-size:64px 64px}
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  header{display:flex;align-items:baseline;gap:14px;margin-bottom:12px;flex-wrap:wrap}
  header h1{font-size:32px;margin:0;color:#fff;text-shadow:3px 3px #3f3f3f;font-weight:normal}
  .splash{color:#fcfc54;text-shadow:2px 2px #3e3e14;transform:rotate(-4deg);display:inline-block;font-size:20px}
  .hint{color:#a0a0a0;text-shadow:2px 2px #282828;font-size:17px}
  .viewport{position:relative;border:3px solid;border-color:#1c1c1c #6b6b6b #6b6b6b #1c1c1c;background:#0a0b10}
  canvas{display:block;width:100%;height:480px;cursor:grab;touch-action:none}
  canvas.dragging{cursor:grabbing}
  .hud{position:absolute;top:6px;left:6px;font-size:17px;color:#e0e0e0;pointer-events:none;line-height:1.35;
    text-shadow:2px 2px rgba(0,0,0,.9);background:rgba(80,80,80,.45);padding:3px 8px}
  .hud b{color:#fff}
  .hud .live{color:#54fc54}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:10px 0;padding:10px 12px;
    background:#c6c6c6;border:3px solid;border-color:#fff #555 #555 #fff}
  button{font-family:'MinecraftTTF','VT323',monospace;font-size:19px;background:#8b8b8b;color:#fff;text-shadow:2px 2px #3f3f3f;
    border:2px solid;border-color:#ddd #2f2f2f #2f2f2f #ddd;padding:5px 16px 3px;cursor:pointer}
  button:hover{background:#8a95c4;border-color:#e8ecff #23273f #23273f #e8ecff;color:#fcfc9c}
  button:active{border-color:#2f2f2f #ddd #ddd #2f2f2f}
  button.primary{background:#6d9c50;border-color:#c8e8b0 #2b451c #2b451c #c8e8b0}
  button.primary:hover{background:#7cb35a;color:#fff}
  label{color:#3f3f3f;display:flex;align-items:center;gap:6px}
  input[type=number]{width:74px;background:#000;border:2px solid #a0a0a0;color:#e0e0e0;
    font-family:'MinecraftTTF','VT323',monospace;font-size:18px;padding:3px 6px}
  input[type=number]:focus,textarea:focus{outline:none;border-color:#fff}
  textarea::placeholder{color:#5a5a5a}
  input[type=range]{accent-color:#5f5f5f}
  input[type=checkbox]{accent-color:#6d9c50;width:16px;height:16px}
  .sep{width:2px;height:26px;background:#a5a5a5;border-right:1px solid #fff}
  textarea{width:100%;min-height:150px;background:#000;border:2px solid #a0a0a0;color:#e0e0e0;
    font-family:'MinecraftTTF','VT323',monospace;font-size:18px;padding:8px 10px;resize:vertical;line-height:1.45}

  .origin-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  kbd{background:#000;color:#e0e0e0;padding:0 6px;border:1px solid #a0a0a0}
  .tabs{display:flex;gap:4px;margin:10px 0 0}

  .tab.active{background:#c6c6c6;color:#fff;border-color:#fff #555 #c6c6c6 #fff}

<body>
<div class="wrap">
  <header>
    <h1>Particle Visualizer</h1>
    <span class="splash">Java 1.21.11!</span>
    <span class="hint">drag to orbit, scroll to zoom, double click ground to move origin</span>
    <a class="kofi" href="https://ko-fi.com/itsjustluke" target="_blank" rel="noopener">Buy me a coffee</a>
  </header>

  <div class="viewport">
    <canvas id="cv"></canvas>
    <div class="hud" id="hud"></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="play">Playback</button>
    <button class="tab" data-tab="scene">Scene</button>
    <button class="tab" data-tab="gen">Generator</button>
  </div>

  <div class="controls tabbody" id="tab-play">
    <button id="playBtn" class="primary">Pause</button>
    <button id="stepBtn">Step</button>
    <button id="burstBtn">Burst Once</button>
    <button id="clearBtn">Clear Particles</button>
    <div class="sep"></div>
    <label><input type="checkbox" id="loopChk" checked> loop every</label>
    <input type="number" id="loopTicks" value="1" min="1" max="100" step="1"><label>ticks</label>
    <div class="sep"></div>
    <label>speed x<input type="number" id="tps" value="1" min="0" step="0.25" style="width:60px"></label>
    <div class="sep"></div>
    <label>zoom <input type="range" id="zoom" min="2" max="300" step="0.5" value="18"></label>
  </div>

  <div class="controls tabbody origin-row" id="tab-scene" style="display:none">
    <label style="color:#1c1c1c">Origin (<kbd>~ ~ ~</kbd>):</label>
    <label>X <input type="number" id="ox" value="0" step="0.5"></label>
    <label>Y <input type="number" id="oy" value="1" step="0.5"></label>
    <label>Z <input type="number" id="oz" value="0" step="0.5"></label>
    <button id="resetOrigin">Reset</button>
    <div class="sep"></div>
    <label><input type="checkbox" id="groundChk"> Solid Ground</label>
    <label><input type="checkbox" id="gcolChk" checked> Ground Collision</label>
    <label><input type="checkbox" id="gridChk" checked> Show Grid</label>
    <label><input type="checkbox" id="invChk"> Invert Camera</label>
  </div>

  <div class="controls tabbody" id="tab-gen" style="display:none">
    <div class="genrow">
      <label>particle</label>
      <input list="ptypes" id="gType" value="flame" style="width:220px">
      <datalist id="ptypes"></datalist>
      <div id="gOpts" class="genrow"></div>
    </div>
    <div class="genrow">
      <label>pos</label>
      <input id="gX" value="~" style="width:60px">
      <input id="gY" value="~" style="width:60px">
      <input id="gZ" value="~" style="width:60px">
      <div class="sep"></div>
      <label>delta</label>
      <input id="gDX" value="0" style="width:60px">
      <input id="gDY" value="0" style="width:60px">
      <input id="gDZ" value="0" style="width:60px">
      <div class="sep"></div>
      <label>speed</label>
      <input id="gSpeed" value="0" style="width:60px">
      <label>count</label>
      <input id="gCount" value="1" style="width:60px">
      <label><input type="checkbox" id="gForce"> force</label>
    </div>
    <div class="genrow"><code id="gOut" class="genout"></code></div>
    <div class="genrow">
      <button id="gCopy">Copy</button>
      <button id="gSend" class="primary">Send To Renderer</button>
      <span class="hint" id="gNote"></span>
    </div>
  </div>

  <div>
    <textarea id="cmds" spellcheck="false" placeholder="particle minecraft:flame ~ ~1 ~ 0.3 0.3 0.3 0.02 20"></textarea>
    <div style="margin-top:8px;display:flex;gap:10px;align-items:center">
      <button id="applyBtn" class="primary">Apply Commands</button>
      <button id="clearCmds">Clear Commands</button>
      <span class="hint">one per line, ctrl+enter to apply</span>
    </div>
    <div id="errors"></div>
    <div class="hint" style="margin-top:10px">Vanilla textures and game data from <a class="cr" href="https://github.com/misode/mcmeta" target="_blank" rel="noopener">misode/mcmeta</a>. Font from <a class="cr" href="https://github.com/tryashtar/minecraft-ttf" target="_blank" rel="noopener">tryashtar/minecraft-ttf</a>. Bug testing by Yegor_Mechanic.</div>
  </div>
</div>

// utilities
const $=id=>document.getElementById(id);
function gauss(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}
const rand=(a,b)=>a+Math.random()*(b-a);
function popVel(vx,vy,vz){
  vx+=(Math.random()*2-1)*.4;vy+=(Math.random()*2-1)*.4;vz+=(Math.random()*2-1)*.4;
  const d=(Math.random()+Math.random()+1)*.15,l=Math.sqrt(vx*vx+vy*vy+vz*vz)||1;
  return[vx/l*d*.4,vy/l*d*.4+.1,vz/l*d*.4];
}
const pick=a=>a[(Math.random()*a.length)|0];
function hexToRgb(h){return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lerpC(c1,c2,t){return [c1[0]+(c2[0]-c1[0])*t|0,c1[1]+(c2[1]-c1[1])*t|0,c1[2]+(c2[2]-c1[2])*t|0];}
function hsv(h,s,v){let f=(n,k=(n+h/60)%6)=>v-v*s*Math.max(Math.min(k,4-k,1),0);return[f(5)*255|0,f(3)*255|0,f(1)*255|0];}

const ASSETS_FB="https://raw.githubusercontent.com/misode/mcmeta/assets/assets/minecraft/";
let cdnDown=false;
const spriteSets={},imgCache={},tintCache={};
function loadImage(url){
  if(imgCache[url])return imgCache[url];
  const im=new Image();im.crossOrigin="anonymous";
  im.onerror=()=>{
    if(im.src.indexOf(ASSETS)===0){cdnDown=true;im.src=ASSETS_FB+im.src.slice(ASSETS.length);}
  };
  im.src=cdnDown&&url.indexOf(ASSETS)===0?ASSETS_FB+url.slice(ASSETS.length):url;
  return imgCache[url]=im;
}

function ensureSprites(name){
  if(spriteSets[name])return;
  const set=spriteSets[name]={frames:[],ready:false};
  const use=list=>{set.frames=list.map(t=>loadImage(ASSETS+"textures/particle/"+t+".png"));set.ready=true;};
  const d=SPRITE_MAP[name];
  if(typeof d==="string")use([d]);
  else if(Array.isArray(d)&&d.length===3&&typeof d[1]==="number")
    use(Array.from({length:d[2]},(_,i)=>d[0]+"_"+(d[1]+i)));
  else if(Array.isArray(d))use(d);
  else{
    const get=b=>fetch(b+"particles/"+name+".json").then(r=>r.ok?r.json():null).catch(()=>null);
    get(ASSETS).then(j=>j||get(ASSETS_FB)).then(j=>{
      if(j&&j.textures&&j.textures.length)use(j.textures.map(t=>t.replace(/^minecraft:/,"")));
    });
  }
}
function tinted(img,col){
  // quantize the color into the key so transitions reuse tints instead of rebuilding
  const key=img.src+"|"+((col[0]>>3)<<10|(col[1]>>3)<<5|(col[2]>>3));
  if(tintCache[key])return tintCache[key];
  if(!img.complete||!img.naturalWidth)return img;
  const c=document.createElement("canvas");c.width=img.naturalWidth;c.height=img.naturalHeight;
  const x=c.getContext("2d");
  x.filter="brightness(1.5)";
  x.drawImage(img,0,0);
  x.filter="none";
  x.globalCompositeOperation="multiply";
  x.fillStyle=`rgb(${col[0]},${col[1]},${col[2]})`;
  x.fillRect(0,0,c.width,c.height);
  x.globalCompositeOperation="destination-in";
  x.drawImage(img,0,0);
  return tintCache[key]=c;
}

// command parsing
function tokenize(s){
  const out=[];let cur="",depth=0;
  for(const ch of s){
    if(ch==="{"||ch==="[")depth++;
    if(ch==="}"||ch==="]")depth--;
    if(/\s/.test(ch)&&depth===0){if(cur){out.push(cur);cur="";}}
    else cur+=ch;
  }
  if(cur)out.push(cur);
  return out;
}

             (m,v)=>(v==="true"||v==="false"||v==="null")?":"+v:':"'+v+'"');
    return JSON.parse(j);
  }catch(e){return null;}
}
function colorFrom(v){ 
  if(Array.isArray(v)){
    let a=v.length===4?v.slice(1):v; // [r,g,b] or 4 components
    if(v.length===4&&v.every(x=>x<=1)) a=v.slice(0,3);
    if(a.every(x=>x<=1)) return a.map(x=>Math.round(x*255));
    return a.map(x=>Math.round(x));
  }
  if(typeof v==="number"){return[(v>>16)&255,(v>>8)&255,v&255];}
  return null;
}
function parseCoord(tok,base,name){
  if(tok.startsWith("~")||tok.startsWith("^")){
    const n=tok.length>1?parseFloat(tok.slice(1)):0;
    if(isNaN(n))throw`bad coordinate "${tok}"`;
    return {rel:true,v:n};
  }
  const n=parseFloat(tok);
  if(isNaN(n))throw`bad ${name} "${tok}"`;
  return {rel:false,v:n};
}
function parseCommands(text){
  const emitters=[],msgs=[];
  text.split("\n").forEach((line,i)=>{
    line=line.trim();
    if(!line||line.startsWith("#"))return;
    if(line.startsWith("/"))line=line.slice(1);
    const t=tokenize(line);
    if(t[0]!=="particle"){msgs.push({t:"e",m:`line ${i+1}: not a particle command`});return;}
    if(t.length<2){msgs.push({t:"e",m:`line ${i+1}: missing particle type`});return;}
    try{
      let typeTok=t[1],opts=null;
      const br=typeTok.indexOf("{");
      if(br>-1){opts=parseSNBT(typeTok.slice(br));typeTok=typeTok.slice(0,br);
        if(!opts)msgs.push({t:"w",m:`line ${i+1}: bad component data, ignored`});}
      const name=typeTok.replace(/^minecraft:/,"");
      if(name==="elder_guardian")throw"particle not currently available due to limitations";
      let def=P[name];
      if(!def){def={colors:["#ff44ff","#111111"],size:.1,life:[14,24],vel:.004,missing:1};
        msgs.push({t:"w",m:`line ${i+1}: unknown particle "${name}", using generic physics`});}
      def=Object.assign({},def);
      def.name=name;
      if(!BLOCK_FAMILY.includes(name))ensureSprites(name);
      if(def.emits)ensureSprites(def.emits);
      if(name==="item_cobweb")def.blockImg=loadImage(ASSETS+"textures/block/cobweb.png");
      if(opts){
        if(name==="dust"){
          const c=colorFrom(opts.color);if(c)def.colors=[c];
          if(opts.scale)def.size=.1*Math.min(4,Math.max(.01,opts.scale));
        }else if(name==="dust_color_transition"){
          const a=colorFrom(opts.from_color),b=colorFrom(opts.to_color);
          def.lerpFrom=a||[255,0,0];def.lerpTo=b||[0,0,255];
          if(opts.scale)def.size=.1*Math.min(4,Math.max(.01,opts.scale));
        }else if(name==="entity_effect"){
          const c=colorFrom(opts.color);if(c)def.colors=[c];
        }else if(name==="block"||name==="falling_dust"||name==="block_marker"||name==="block_crumble"||name==="dust_pillar"){
          let bs=opts.block_state;if(typeof bs==="object")bs=bs.Name||bs.name;
          if(typeof bs==="string"){const bn=bs.replace(/^minecraft:/,"").replace(/\[.*$/,"");
            if(BLOCK_COLORS[bn])def.colors=[BLOCK_COLORS[bn]];
            const tex=blockTexName(bn);
            def.blockImg=loadImage(ASSETS+"textures/block/"+tex+".png");
            def.blockImgTop=loadImage(ASSETS+"textures/block/"+tex+"_top.png");
            def.blockImgSide=loadImage(ASSETS+"textures/block/"+tex+"_side.png");}
        }else if(name==="trail"){
          const c=colorFrom(opts.color);if(c)def.colors=[c];
          if(Array.isArray(opts.target))def.trailTarget=opts.target.map(Number);
          if(opts.duration)def.trailDur=+opts.duration;
        }else if(name==="vibration"){
          const dp=opts.destination&&(opts.destination.pos||opts.destination.block_pos);
          if(Array.isArray(dp))def.trailTarget=dp.map(Number);
          if(opts.arrival_in_ticks)def.trailDur=+opts.arrival_in_ticks;
        }else if(name==="item"){
          let it=opts.item;if(it&&typeof it==="object")it=it.id;
          if(typeof it==="string"){const iid=it.replace(/^minecraft:/,"");
            def.blockImg=loadImage(ASSETS+"textures/item/"+iid+".png");
            def.blockImgTop=loadImage(ASSETS+"textures/block/"+iid+".png");
            def.blockImgSide=loadImage(ASSETS+"textures/block/"+iid+"_top.png");}
        }else if(name==="shriek"){
          if(opts.delay)def.delayTicks=+opts.delay;
        }else if(name==="flash"){
          const c=colorFrom(opts.color);if(c){def.colors=[c];def.tint=1;}
        }
      }
      if(BLOCK_FAMILY.includes(name)&&!def.blockImg)
        throw`${name} requires block_state, e.g. ${name}{block_state:"minecraft:sand"}`;
      const pos=[{rel:true,v:0},{rel:true,v:0},{rel:true,v:0}];
      for(let k=0;k<3;k++)if(t[2+k]!==undefined)pos[k]=parseCoord(t[2+k],0,"xyz"[k]);
      const delta=[0,0,0];
      for(let k=0;k<3;k++)if(t[5+k]!==undefined){delta[k]=parseFloat(t[5+k]);if(isNaN(delta[k]))throw`bad delta "${t[5+k]}"`;}
      let speed=t[8]!==undefined?parseFloat(t[8]):0;
      let count=t[9]!==undefined?parseInt(t[9]):0;
      if(isNaN(speed))throw`bad speed "${t[8]}"`;
      if(isNaN(count))throw`bad count "${t[9]}"`;
      if(count>20000){msgs.push({t:"w",m:`line ${i+1}: count capped at 20000`});count=20000;}
      if(name==="note"&&count===0)def.hueFixed=((delta[0]%1)+1)%1;
      emitters.push({def,pos,delta,speed,count,line:i+1});
    }catch(err){msgs.push({t:"e",m:`line ${i+1}: ${err}`});}
  });
  return {emitters,msgs};
}

// simulation
let particles=[],emitters=[],tick=0;
const MAX_PARTICLES=100000;
const origin={x:0,y:1,z:0};

function spawnFromEmitter(em){
  const px=em.pos[0].rel?origin.x+em.pos[0].v:em.pos[0].v;
  const py=em.pos[1].rel?origin.y+em.pos[1].v:em.pos[1].v;
  const pz=em.pos[2].rel?origin.z+em.pos[2].v:em.pos[2].v;
  const n=em.count===0?1:em.count;
  for(let i=0;i<n;i++){
    if(particles.length>=MAX_PARTICLES)return;
    let x=px,y=py,z=pz,vx=0,vy=0,vz=0;
    if(em.count===0){
      if(!em.def.noSpeed){vx=em.delta[0]*em.speed;vy=em.delta[1]*em.speed;vz=em.delta[2]*em.speed;}
    }else{
      x+=gauss()*em.delta[0];y+=gauss()*em.delta[1];z+=gauss()*em.delta[2];
      if(em.speed>0&&!em.def.noSpeed){vx=gauss()*em.speed;vy=gauss()*em.speed;vz=gauss()*em.speed;}
    }
    if(em.def.emits){
      const cd=Object.assign({},P[em.def.emits]||{},{name:em.def.emits});
      for(let k=0;k<em.def.n;k++)
        makeParticle(cd,x+gauss()*em.def.spread,y+Math.abs(gauss())*em.def.spread*.5,z+gauss()*em.def.spread,0,0,0,px,py,pz);
      continue;
    }
    makeParticle(em.def,x,y,z,vx,vy,vz,px,py,pz);
  }
}
function makeParticle(def,x,y,z,vx,vy,vz,ox2,oy2,oz2){
  let noteHue=null;
  if(def.name==="note")noteHue=vx!==0?(((vx%1)+1)%1):Math.random();
  if(def.ignoreVel){vx=0;vy=0;vz=0;}
  const iv=def.vel||0;
  vx+=gauss()*iv;vy+=gauss()*iv;vz+=gauss()*iv;
  if(def.velMul){vx*=def.velMul;vy*=def.velMul;vz*=def.velMul;}
  if(def.pop){const v=popVel(vx,vy,vz);vx=v[0];vy=v[1];vz=v[2];
    if(def.popMul){vx*=def.popMul;vy*=def.popMul;vz*=def.popMul;}}
  else if(def.popZero){ // vanilla pattern: normalized pop of zero, scaled, plus raw input
    const v=popVel(0,0,0),m=def.popMul||1,im=def.inMul!==undefined?def.inMul:1;
    vx=v[0]*m+vx*im;vy=v[1]*m+vy*im;vz=v[2]*m+vz*im;}
  const lf=def.lifeN?(((def.lifeN[0]/(Math.random()*0.8+0.2))*(def.lifeN[2]||1)+(def.lifeN[1]||0))|0)
    :def.life8?(8/(Math.random()*0.8+0.2))|0:rand(def.life[0],def.life[1])|0;
  const p={x,y,z,vx,vy,vz,age:0,life:lf,def,
    ox:ox2,oy:oy2,oz:oz2,seed:Math.random()*Math.PI*2,szm:rand(.7,1.3)};
  if(def.behavior==="portal"){
    p.tx=x;p.ty=y;p.tz=z;
    let dx=p.vx,dy=p.vy,dz=p.vz;
    if(!dx&&!dy&&!dz){dx=gauss()*.6;dy=(Math.random()-.5)*1.2;dz=gauss()*.6;}
    p.dx=dx;p.dy=dy;p.dz=dz;
  }
  if(def.behavior==="note")p.vy=.2;
  if(def.up)p.vy+=rand(def.up[0],def.up[1]);
  if(def.upF)p.vy+=def.upF;
  if(def.szW)p.szm=rand(def.szW[0],def.szW[1]);
  p.hidden=def.delayTicks||0;
  if(def.behavior==="trail"){
    p.sx=x;p.sy=y;p.sz=z;
    if(def.trailTarget){p.tx=def.trailTarget[0];p.ty=def.trailTarget[1];p.tz=def.trailTarget[2];
      if(def.trailDur)p.life=def.trailDur|0;}
    else{p.tx=x+gauss();p.ty=y+gauss()*.5;p.tz=z+gauss();}
  }
  if(def.behavior==="burst"){
    const a=Math.random()*Math.PI*2,b=Math.random()*Math.PI-Math.PI/2,s=rand(.05,.25);
    p.vx+=Math.cos(a)*Math.cos(b)*s;p.vy+=Math.sin(b)*s;p.vz+=Math.sin(a)*Math.cos(b)*s;
  }
  if(def.behavior==="drip"){const h=def.hangT||[20,40];p.hang=rand(h[0],h[1])|0;}
  let col;
  if(def.lerpFrom)col=def.lerpFrom.slice();
  else if(noteHue!==null)col=hsv(noteHue*360,.85,1);
  else{const c=pick(def.colors);col=c==="#hue"?hsv((def.hueFixed!==undefined?def.hueFixed:Math.random())*360,.8,1):(typeof c==="string"?hexToRgb(c):c);}
  if(def.missing&&Math.random()<.5)col=[17,17,17];
  p.col=col;
  particles.push(p);
}
function stepSim(){
  tick++;
  const chk=$("loopChk").checked,iv=Math.max(1,parseInt($("loopTicks").value)||1);
  const gCol=elGround.checked&&elGcol.checked;
  const cgx=Math.floor(origin.x),cgz=Math.floor(origin.z),CR=8;
  if(chk&&tick%iv===0)emitters.forEach(spawnFromEmitter);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i],d=p.def;
    if(p.hidden>0){p.hidden--;continue;}
    p.age++;
    if(p.age>=p.life){particles.splice(i,1);continue;}
    if(d.behavior==="portal"){
      let f=p.age/p.life;f=-f+f*f*2;f=1-f;
      p.x=p.tx+p.dx*f;p.y=p.ty+p.dy*f+(d.sink?f:0);p.z=p.tz+p.dz*f;
      continue;
    }
    if(d.behavior==="trail"){
      let t=p.age/p.life;t=t*t*(3-2*t);
      p.x=p.sx+(p.tx-p.sx)*t;p.y=p.sy+(p.ty-p.sy)*t;p.z=p.sz+(p.tz-p.sz)*t;
      continue;
    }
    if(d.behavior==="drip"&&p.hang>0){p.hang--;continue;}
    if(d.behavior==="drip"){p.vy-=.05;}
    if(d.waft){p.vx+=(Math.random()-.5)*.0005;p.vz+=(Math.random()-.5)*.0005;}
    if(d.behavior==="leaf"){
      p.vy=-.012;
      p.vx+=Math.cos(p.age*.08+p.seed)*.0015;
      p.vz+=Math.sin(p.age*.07+p.seed)*.0015;
    }
    if(d.grav)p.vy-=d.grav;
    if(d.rise)p.vy+=d.rise*(1-Math.min(1,p.age/p.life*.5));
    const py0=p.y;
    p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;
    if(gCol&&!d.noPhys&&p.x>=cgx-CR&&p.x<=cgx+CR&&p.z>=cgz-CR&&p.z<=cgz+CR){
      if(py0>=0&&p.y<0&&p.vy<0){ // landing on top
        p.y=.001;p.vy=0;p.vx*=.7;p.vz*=.7;
      }else if(py0<=0&&p.y>0&&p.vy>0){ // pressing on the underside
        p.y=-.001;p.vy=0;
        if(d.ySlide){p.vx*=1.15;p.vz*=1.15;
          const m=Math.hypot(p.vx,p.vz);if(m>.4){p.vx*=.4/m;p.vz*=.4/m;}}
      }
    }
    if(d.drag){p.vx*=d.drag;p.vy*=d.drag;p.vz*=d.drag;}
    if(d.lerpFrom)p.col=lerpC(d.lerpFrom,d.lerpTo,p.age/p.life);
  }
}

// renderer
const cv=$("cv"),ctx=cv.getContext("2d");
const cam={yaw:.7,pitch:.45,dist:18};
// cap render res, phones report dpr 2-3 and draw way more pixels than needed
const DPR=Math.min(1.5,devicePixelRatio||1);
function resize(){const r=cv.getBoundingClientRect();cv.width=r.width*DPR;cv.height=r.height*DPR;}
window.addEventListener("resize",resize);
function project(x,y,z){
  const dx=x-origin.x,dy=y-origin.y,dz=z-origin.z;
  const cy=Math.cos(cam.yaw),sy=Math.sin(cam.yaw),cp=Math.cos(cam.pitch),sp=Math.sin(cam.pitch);
  let rx=dx*cy-dz*sy, rz=dx*sy+dz*cy;
  let ry=dy*cp+rz*sp; rz=rz*cp-dy*sp;
  const depth=rz+cam.dist;
  if(depth<=.3)return null;
  const f=(cv.height*1.15)/depth;
  return {x:cv.width/2+rx*f, y:cv.height/2-ry*f, s:f, d:depth};
}
function line3(x1,y1,z1,x2,y2,z2,style,w){
  const a=project(x1,y1,z1),b=project(x2,y2,z2);
  if(!a||!b)return;
  ctx.strokeStyle=style;ctx.lineWidth=w||1;
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
}
function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.imageSmoothingEnabled=false;
  const g=Math.floor;
  const gx=g(origin.x),gz=g(origin.z),R=8;
  if(elGround.checked){
    for(let ix=-R;ix<R;ix++)for(let iz=-R;iz<R;iz++){
      const a=project(gx+ix,0,gz+iz),b=project(gx+ix+1,0,gz+iz),
            c=project(gx+ix+1,0,gz+iz+1),e=project(gx+ix,0,gz+iz+1);
      if(!a||!b||!c||!e)continue;
      ctx.fillStyle=((ix+iz)&1)?"#252b26":"#1d221e";
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
      ctx.lineTo(c.x,c.y);ctx.lineTo(e.x,e.y);ctx.closePath();ctx.fill();
    }
  }
  if(elGrid.checked)for(let i=-R;i<=R;i++){
    line3(gx-R,0,gz+i,gx+R,0,gz+i,i===0&&gz+i===0?"#3a4a6a":"#20263a",1);
    line3(gx+i,0,gz-R,gx+i,0,gz+R,i===0&&gx+i===0?"#3a4a6a":"#20263a",1);
  }
  // origin marker
  line3(origin.x-.4,origin.y,origin.z,origin.x+.4,origin.y,origin.z,"#ff5555",2);
  line3(origin.x,origin.y-.4,origin.z,origin.x,origin.y+.4,origin.z,"#55ff7f",2);
  line3(origin.x,origin.y,origin.z-.4,origin.x,origin.y,origin.z+.4,"#5588ff",2);
  // particles depth-sorted
  let camP=null;
  if(elGround.checked){
    const cy2=Math.cos(cam.yaw),sy2=Math.sin(cam.yaw),cp2=Math.cos(cam.pitch),sp2=Math.sin(cam.pitch);
    camP={x:origin.x-cam.dist*cp2*sy2,y:origin.y+cam.dist*sp2,z:origin.z-cam.dist*cp2*cy2};
  }
  const hidByGround=p=>{
    if(!camP)return false;
    if((camP.y>=0)===(p.y>=0))return false;
    const t=camP.y/(camP.y-p.y);
    if(!(t>0&&t<1))return false;
    const ix=camP.x+(p.x-camP.x)*t,iz=camP.z+(p.z-camP.z)*t;
    return ix>=gx-R&&ix<=gx+R&&iz>=gz-R&&iz<=gz+R;
  };
  const drawable=[];
  for(const p of particles){
    if(p.hidden>0)continue;
    if(hidByGround(p))continue;
    const pr=project(p.x,p.y,p.z);
    if(pr)drawable.push([pr,p]);
  }
  if(drawable.length<15000)drawable.sort((a,b)=>b[0].d-a[0].d);
  for(const [pr,p] of drawable){
    const d=p.def,t=p.age/p.life;
    let sz=d.size*(d.noSzVar?1:p.szm)*pr.s;
    if(d.curve==="flame")sz*=1-t*t*.5;
    else if(d.curve==="pop")sz*=Math.min(1,p.age*32/p.life);
    else if(d.curve==="grow")sz*=.5+.5*Math.min(1,t*2.5);
    else if(d.shrink)sz*=1-t*.8;
    if(sz<1*DPR)sz=1*DPR;
    let alpha=1;
    if(d.fade&&t>.7)alpha=1-(t-.7)/.3;
    if(d.flicker)alpha*=rand(.4,1);
    const[r,gc,b]=p.col;
    ctx.globalAlpha=Math.max(0,alpha);
    const ok=im=>im&&im.complete&&im.naturalWidth;
    let img=null,crop=null;
    if(d.blockImg||d.blockImgTop){
      const bi=ok(d.blockImg)?d.blockImg:(ok(d.blockImgTop)?d.blockImgTop:(ok(d.blockImgSide)?d.blockImgSide:null));
      if(bi){img=bi;
        if(d.name!=="block_marker"){ // random quarter of the block texture
          const w=bi.naturalWidth,h=bi.naturalHeight,f1=p.seed/(Math.PI*2),f2=(p.seed*7)%1;
          crop=[(f1*(w*.75))|0,(f2*(h*.75))|0,w>>2,h>>2];}}
    }else{
      const sp=spriteSets[d.name];
      if(sp&&sp.ready&&sp.frames.length){
        const idx=d.randFrame?Math.min(sp.frames.length-1,(p.seed/(Math.PI*2)*sp.frames.length)|0)
          :Math.min(sp.frames.length-1,(p.age*sp.frames.length/(p.life+1))|0);
        if(ok(sp.frames[idx]))img=sp.frames[idx];
      }
    }
    if(img){
      if(d.tint)img=tinted(img,p.col);
      if(crop)ctx.drawImage(img,crop[0],crop[1],crop[2],crop[3],pr.x-sz,pr.y-sz,sz*2,sz*2);
      else ctx.drawImage(img,pr.x-sz,pr.y-sz,sz*2,sz*2);
    }else{
      ctx.fillStyle=`rgb(${r},${gc},${b})`;
      ctx.fillRect(pr.x-sz,pr.y-sz,sz*2,sz*2);
    }
  }
  ctx.globalAlpha=1;
}

// loop
// cache the checkbox nodes, i read them every frame
const elGround=$("groundChk"),elGrid=$("gridChk"),elInv=$("invChk"),elGcol=$("gcolChk"),elTps=$("tps");
let playing=true,acc=0,last=performance.now(),fps=60;
function frame(now){
  const dt=Math.min(200,now-last);last=now;
  fps=fps*.92+(1000/Math.max(1,dt))*.08;
  const mult=parseFloat(elTps.value);
  if(playing&&mult>0){
    acc+=dt;const tickMs=50/mult;let n=0;
    while(acc>=tickMs&&n<80){stepSim();acc-=tickMs;n++;}
    if(n>=80)acc=0;
  }
  draw();
  $("hud").innerHTML=
    `<b>${particles.length}</b> particles${particles.length>=MAX_PARTICLES?' <span style="color:#fcfc54">(cap)</span>':''}<br>`+
    `tick <b>${tick}</b>  ${playing?'<span class="live">running</span>':'paused'} ${(fps|0)} fps<br>`+
    `origin <b>${origin.x} ${origin.y} ${origin.z}</b><br>`+
    `textures: ${Object.values(spriteSets).some(s=>s.ready)?'<span class="live">vanilla assets</span>':'loading'}`;
  requestAnimationFrame(frame);
}

// input: orbit / zoom / origin
let drag=null,pinch=null;
cv.addEventListener("pointerdown",e=>{cv.setPointerCapture(e.pointerId);
  if(pinchPts.size===1){const o=[...pinchPts.values()][0];pinch={d:Math.hypot(e.clientX-o.x,e.clientY-o.y)};}
  pinchPts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  drag={x:e.clientX,y:e.clientY};cv.classList.add("dragging");});
const pinchPts=new Map();
cv.addEventListener("pointermove",e=>{
  if(pinchPts.has(e.pointerId))pinchPts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(pinchPts.size===2){
    const[a,b]=[...pinchPts.values()];
    const nd=Math.hypot(a.x-b.x,a.y-b.y);
    if(pinch&&pinch.d>0){cam.dist=Math.min(300,Math.max(2,cam.dist*pinch.d/nd));$("zoom").value=cam.dist;}
    pinch={d:nd};return;
  }
  if(!drag)return;
  const inv=elInv.checked?-1:1;
  cam.yaw+=(e.clientX-drag.x)*.008;
  cam.pitch=Math.min(1.55,Math.max(-1.55,cam.pitch+inv*(e.clientY-drag.y)*.008));
  drag={x:e.clientX,y:e.clientY};
});
function endPtr(e){pinchPts.delete(e.pointerId);if(pinchPts.size<2)pinch=null;if(pinchPts.size===0){drag=null;cv.classList.remove("dragging");}}
cv.addEventListener("pointerup",endPtr);cv.addEventListener("pointercancel",endPtr);
cv.addEventListener("wheel",e=>{e.preventDefault();
  cam.dist=Math.min(300,Math.max(2,cam.dist*(e.deltaY>0?1.1:0.9)));$("zoom").value=cam.dist;},{passive:false});
$("zoom").addEventListener("input",e=>cam.dist=parseFloat(e.target.value));
cv.addEventListener("dblclick",e=>{ // pick ground point under cursor
  const rect=cv.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*DPR,my=(e.clientY-rect.top)*DPR;
  let best=null;
  for(let x=origin.x-10;x<=origin.x+10;x+=.25)for(let z=origin.z-10;z<=origin.z+10;z+=.25){
    const pr=project(x,0,z);if(!pr)continue;
    const dd=(pr.x-mx)**2+(pr.y-my)**2;
    if(!best||dd<best.dd)best={x,z,dd};
  }
  if(best&&best.dd<(30*DPR)**2){
    origin.x=Math.round(best.x*2)/2;origin.z=Math.round(best.z*2)/2;
    $("ox").value=origin.x;$("oz").value=origin.z;
  }
});
["ox","oy","oz"].forEach((id,i)=>$(id).addEventListener("input",e=>{
  const v=parseFloat(e.target.value);if(!isNaN(v))origin["xyz"[i]]=v;}));
$("resetOrigin").onclick=()=>{origin.x=0;origin.y=1;origin.z=0;$("ox").value=0;$("oy").value=1;$("oz").value=0;};

// controls
$("playBtn").onclick=()=>{playing=!playing;$("playBtn").textContent=playing?"Pause":"Play";};

// tab switch. keep hidden bodies in the dom, i read their checkboxes each frame
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.toggle("active",x===b));
  document.querySelectorAll(".tabbody").forEach(x=>x.style.display="none");
  $("tab-"+b.dataset.tab).style.display="flex";
});

// per-particle option fields for the generator. [key, kind, default].
// particles not listed get no extra boxes
const GEN_FIELDS={
  block:[["block_state","block","stone"]],
  block_marker:[["block_state","block","barrier"]],
  block_crumble:[["block_state","block","stone"]],
  dust_pillar:[["block_state","block","stone"]],
  falling_dust:[["block_state","block","sand"]],
  item:[["item","item","apple"]],
  dust:[["color","color","1 0 0"],["scale","num","1"]],
  dust_color_transition:[["from_color","color","1 0 0"],["to_color","color","0 0 1"],["scale","num","1"]],
  entity_effect:[["color","color","1 0 0 1"]],
  sculk_charge:[["roll","num","0"]],
  shriek:[["delay","int","0"]],
  dragon_breath:[["power","num",""]],
  trail:[["target","pos","0 0 0"],["color","color","1 1 1"],["duration","int","20"]],
  vibration:[["destination","psource","0 0 0"],["arrival_in_ticks","int","20"]]
};
(()=>{
  const dl=$("ptypes");
  // fill the dropdown from the physics table. skip elder_guardian, it just errors
  Object.keys(P).filter(n=>n.indexOf(":")<0&&n!=="elder_guardian").sort().forEach(n=>{
    const o=document.createElement("option");o.value=n;dl.appendChild(o);
  });
  const g=id=>($(id)?$(id).value.trim():"");
  const type=()=>g("gType").replace(/^minecraft:/,"")||"flame";
  const ns=v=>v.indexOf(":")<0?"minecraft:"+v:v;
  const nums=v=>v.split(/[\s,]+/).filter(Boolean).join(",");

// rebuild the option boxes for the current particle
  function fields(){
    const spec=GEN_FIELDS[type()],wrap=$("gOpts");
    wrap.innerHTML="";
    if(!spec){$("gNote").textContent="";return;}
    spec.forEach(([key,kind,def])=>{
      const l=document.createElement("label");l.textContent=key;
      const i=document.createElement("input");i.id="gf_"+key;i.value=def;
      i.style.width=kind==="block"||kind==="item"?"170px":
        kind==="color"||kind==="pos"||kind==="psource"?"110px":"60px";
      if(kind==="block")i.placeholder="stone";
      if(kind==="item")i.placeholder="apple";
      i.addEventListener("input",build);
      wrap.appendChild(l);wrap.appendChild(i);
    });
    $("gNote").textContent="no brackets needed, ids get namespaced for you";
  }

  // build snbt from the boxes. quote ids, a raw {} or [] passes through
  function comp(){
    const spec=GEN_FIELDS[type()];
    if(!spec)return "";
    const out=[];
    spec.forEach(([key,kind])=>{
      let v=g("gf_"+key);
      if(!v)return;
      if(v[0]==="{"||v[0]==="["){out.push(key+":"+v);return;} // raw snbt, pass it through
      if(kind==="block")out.push(key+':"'+ns(v)+'"');
      else if(kind==="item")out.push(key+':{id:"'+ns(v)+'"}');
      else if(kind==="color"||kind==="pos")out.push(key+":["+nums(v)+"]");
      else if(kind==="psource")out.push(key+':{type:"minecraft:block",pos:['+nums(v)+"]}");
      else out.push(key+":"+v);
    });
    return out.length?"{"+out.join(",")+"}":"";
  }

  function build(){
    let line="particle minecraft:"+type()+comp()+" "+
      [g("gX")||"~",g("gY")||"~",g("gZ")||"~"].join(" ")+" "+
      [g("gDX")||"0",g("gDY")||"0",g("gDZ")||"0"].join(" ")+" "+
      (g("gSpeed")||"0")+" "+(g("gCount")||"0");
    if($("gForce").checked)line+=" force";
    $("gOut").textContent=line;
    return line;
  }
  window.genBuild=build;

  $("gType").addEventListener("input",()=>{fields();build();});
  ["gX","gY","gZ","gDX","gDY","gDZ","gSpeed","gCount","gForce"]
    .forEach(id=>$(id).addEventListener("input",build));

  $("gCopy").onclick=()=>{
    const line=build(),btn=$("gCopy");
    const ok=()=>{btn.textContent="Copied!";setTimeout(()=>btn.textContent="Copy",1200);};
    if(navigator.clipboard&&navigator.clipboard.writeText)
      navigator.clipboard.writeText(line).then(ok,()=>prompt("copy this:",line));
    else prompt("copy this:",line);
  };
// append on a new line, don't wipe the box
  $("gSend").onclick=()=>{
    const box=$("cmds"),line=build();
    box.value=box.value.trim()?box.value.replace(/\s+$/,"")+"\n"+line:line;
    if(window.autoGrow)window.autoGrow();
    particles=[];apply();
  };
  fields();build();
})();
$("stepBtn").onclick=()=>{if(playing){playing=false;$("playBtn").textContent="Play";}stepSim();};
$("burstBtn").onclick=()=>emitters.forEach(spawnFromEmitter);
$("clearBtn").onclick=()=>{particles=[];};
function apply(){
  const {emitters:em,msgs}=parseCommands($("cmds").value);
  emitters=em;
  $("errors").innerHTML=msgs.map(m=>`<div class="${m.t}">${m.t==="e"?"[error]":"[warn]"} ${m.m}</div>`).join("")+
    (em.length?`<div class="ok">${em.length} command${em.length>1?"s":""} loaded</div>`:"");
}
$("applyBtn").onclick=()=>{particles=[];apply();};
// clear the command box and everything loaded from it
$("clearCmds").onclick=()=>{
  $("cmds").value="";emitters=[];particles=[];
  $("errors").innerHTML="";autoGrow();$("cmds").focus();
};

// grow the box to fit its lines, no inner scrollbar
window.autoGrow=autoGrow;
function autoGrow(){
  const t=$("cmds");
  t.style.height="auto";
  t.style.height=Math.max(150,t.scrollHeight+4)+"px";
}
$("cmds").addEventListener("input",autoGrow);
autoGrow();
$("cmds").addEventListener("keydown",e=>{if(e.key==="Enter"&&(e.ctrlKey||e.metaKey)){particles=[];apply();}});

resize();apply();requestAnimationFrame(frame);
</script>
